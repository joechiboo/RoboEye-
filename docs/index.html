<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboEye — CNN 即時年齡 / 性別預測</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 1.5rem 1rem 1rem;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00e676;
        }

        header p {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.3rem;
        }

        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 0 1rem 2rem;
            width: 100%;
            max-width: 720px;
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            aspect-ratio: 4 / 3;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-start {
            background: #00e676;
            color: #0f0f0f;
        }
        #btn-start:hover { background: #00c853; }
        #btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }

        #btn-stop {
            background: #ff5252;
            color: #fff;
        }
        #btn-stop:hover { background: #d32f2f; }
        #btn-stop:disabled { background: #333; color: #666; cursor: not-allowed; }

        #status {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            min-height: 1.2rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: #aaa;
        }

        .stats span { font-weight: 600; color: #00e676; }

        .method-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .method-btn {
            padding: 0.5rem 1.2rem;
            background: #222;
            color: #aaa;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .method-btn:hover { border-color: #00e676; color: #e0e0e0; }

        .method-btn.active {
            border-color: #00e676;
            background: #1a3a2a;
            color: #00e676;
        }

        .method-info {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            min-height: 1.2rem;
        }

        footer {
            margin-top: auto;
            padding: 1rem;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
        }

        footer a { color: #00e676; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h1>RoboEye</h1>
    <p>CNN 即時年齡 / 性別預測 — 多模型比較 | 純瀏覽器推論</p>
</header>

<div id="app">
    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="method-selector">
        <button class="method-btn active" data-method="caffe">方法 1: Caffe (2015)</button>
        <button class="method-btn" data-method="mobilenet">方法 2: MobileNetV2 + DEX</button>
        <button class="method-btn" data-method="insightface">方法 3: InsightFace</button>
    </div>
    <div class="method-info" id="method-info">Levi & Hassner — 8 個年齡區間分類，經典基礎模型</div>

    <div class="controls">
        <button id="btn-start">開始偵測</button>
        <button id="btn-stop" disabled>停止</button>
    </div>

    <div id="status">載入模型中...</div>

    <div class="stats">
        <div>FPS: <span id="fps">0</span></div>
        <div>偵測人臉: <span id="face-count">0</span></div>
        <div>模型: <span id="current-method">Caffe</span></div>
    </div>
</div>

<footer>
    <p>Models: Caffe (2015) · MobileNetV2 + DEX · InsightFace | Inference: ONNX Runtime Web</p>
    <p>
        <a href="https://github.com/" target="_blank">GitHub</a>
    </p>
</footer>

<!-- face-api.js for face detection (vladmandic fork, actively maintained) -->
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
<!-- ONNX Runtime Web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
<!-- App -->
<script>
    const METHOD_INFO = {
        caffe: "Levi & Hassner (2015) — 8 個年齡區間分類，經典基礎模型",
        mobilenet: "MobileNetV2 + DEX — softmax 期望值回歸，輕量且精確",
        insightface: "InsightFace buffalo_l — 最新架構，精確度最高",
    };

    let currentMethod = "caffe";

    document.querySelectorAll(".method-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".method-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentMethod = btn.dataset.method;
            document.getElementById("method-info").textContent = METHOD_INFO[currentMethod];
            document.getElementById("current-method").textContent =
                btn.textContent.split(":")[1]?.trim() || currentMethod;
        });
    });
</script>
<script src="js/app.js"></script>

</body>
</html>
